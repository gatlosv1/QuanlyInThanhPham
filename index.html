<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>In Nhãn TP - Quản Lý Sầu Riêng</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');
        body { font-family: 'Roboto', sans-serif; }
        
        .label-preview {
            width: 90mm;
            height: 60mm;
            border: 2px solid #000;
            background: white;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            font-size: 8.5pt;
            line-height: 1.2;
            padding: 8px;
        }
    </style>
</head>
<body class="bg-gray-100">
    <div class="max-w-7xl mx-auto p-6">
        <h1 class="text-3xl font-bold text-center mb-8 text-gray-800">HỆ THỐNG IN NHÃN THÀNH PHẨM</h1>

        <div class="grid grid-cols-12 gap-6">
            <!-- Form Nhập -->
            <div class="col-span-12 lg:col-span-7 bg-white rounded-2xl shadow p-8">
                <h2 class="text-2xl font-semibold mb-6">Nhập Thông Tin</h2>

                <div class="grid grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium mb-1">Mã BTP (Lot)</label>
                        <input id="maBTP" type="text" class="w-full px-4 py-3 border rounded-xl" placeholder="D009MT15066-02-0K" oninput="updatePreview()">

                        <div class="grid grid-cols-2 gap-4 mt-4">
                            <div>
                                <label class="block text-sm font-medium mb-1">Quy Cách</label>
                                <input id="quyCach" type="text" value="20kg" class="w-full px-4 py-3 border rounded-xl" oninput="updatePreview()">
                            </div>
                        </div>

                        <div class="mt-4">
                            <label class="block text-sm font-medium mb-1">VÙNG NGUYÊN LIỆU</label>
                            <select id="vungNguyenLieu" class="w-full px-4 py-3 border rounded-xl" onchange="updatePreview()">
                                <option value="MT">MT - Miền Tây</option>
                                <option value="BP">BP - Bình Phước</option>
                                <option value="DN">DN - Đồng Nai</option>
                            </select>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-1">SKU</label>
                        <input id="sku" type="text" class="w-full px-4 py-3 border rounded-xl" placeholder="TP101020203.01.001" oninput="updatePreview()">

                        <label class="block text-sm font-medium mb-1 mt-4">Tên Thành Phẩm</label>
                        <input id="tenTP" type="text" class="w-full px-4 py-3 border rounded-xl" placeholder="TP CẤP ĐÔNG SẦU RIÊNG..." oninput="updatePreview()">
                    </div>
                </div>

                <div class="grid grid-cols-4 gap-4 mt-6">
                    <div>
                        <label class="block text-sm font-medium mb-1">STT in đầu</label>
                        <input id="sttDau" type="number" value="1" class="w-full px-4 py-3 border rounded-xl" oninput="updateSttCuoi()">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Số lượng tem</label>
                        <input id="soLuongTem" type="number" value="1" min="1" class="w-full px-4 py-3 border rounded-xl font-semibold" oninput="updateSttCuoi()">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">STT in cuối</label>
                        <input id="sttCuoi" type="number" value="1" class="w-full px-4 py-3 border rounded-xl bg-gray-50" readonly>
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Ngày SX</label>
                        <input id="ngaySX" type="date" class="w-full px-4 py-3 border rounded-xl" onchange="updatePreview()">
                    </div>
                </div>

                <div class="mt-6">
                    <label class="block text-sm font-medium mb-1">Ngày ĐG (không sửa)</label>
                    <input id="ngayDG" type="date" readonly class="w-full px-4 py-3 border bg-gray-100 rounded-xl">
                </div>

                <div class="mt-8 flex gap-4">
                    <button onclick="loadFromGrid()" class="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white py-4 rounded-xl font-medium">
                        <i class="fas fa-search"></i> Chọn từ Danh sách
                    </button>
                    <button onclick="clearForm()" class="flex-1 bg-gray-500 hover:bg-gray-600 text-white py-4 rounded-xl font-medium">
                        <i class="fas fa-trash"></i> Xóa Form
                    </button>
                </div>
            </div>

            <!-- Preview + Danh sách -->
            <div class="col-span-12 lg:col-span-5 space-y-6">
                <div class="bg-white rounded-2xl shadow p-6">
                    <h2 class="text-xl font-semibold mb-4">Xem Trước Nhãn</h2>
                    <div class="flex justify-center">
                        <div id="previewLabel" class="label-preview"></div>
                    </div>
                </div>

                <div class="bg-white rounded-2xl shadow overflow-hidden">
                    <div class="px-6 py-4 bg-gray-50 border-b flex justify-between items-center">
                        <h3 class="font-semibold">Danh sách Thành Phẩm</h3>
                        <label class="cursor-pointer bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-xl flex items-center gap-2 text-sm">
                            <i class="fas fa-upload"></i> Import Excel
                            <input type="file" id="excelFile" accept=".xlsx,.xls" class="hidden" onchange="importExcel(this)">
                        </label>
                    </div>
                    
                    <div class="p-4">
                        <input id="searchInput" type="text" placeholder="Tìm mã SP hoặc tên..." class="w-full px-4 py-3 border rounded-xl" onkeyup="filterGrid()">
                    </div>

                    <div class="max-h-96 overflow-auto">
                        <table id="dataGrid" class="w-full text-sm">
                            <thead class="bg-gray-50 sticky top-0">
                                <tr>
                                    <th class="px-4 py-3 text-left">STT</th>
                                    <th class="px-4 py-3 text-left">Mã SP</th>
                                    <th class="px-4 py-3 text-left">Tên TP</th>
                                </tr>
                            </thead>
                            <tbody id="gridBody"></tbody>
                        </table>
                    </div>
                </div>

                <button onclick="printLabels()" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-5 rounded-2xl text-xl font-semibold flex items-center justify-center gap-3">
                    <i class="fas fa-print"></i> IN NHÃN
                </button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDhdMp0KSXEjbyzi69FJTdYoi94PxhCJYs",
            authDomain: "quanlyinsaurieng.firebaseapp.com",
            projectId: "quanlyinsaurieng",
            storageBucket: "quanlyinsaurieng.firebasestorage.app",
            messagingSenderId: "982338646873",
            appId: "1:982338646873:web:9f0afa7e9d81b9bb29d248"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let products = [];
        let selectedIndex = -1;

        function loadProductsFromFirebase() {
            db.collection("thanhpham").orderBy("stt").onSnapshot((snapshot) => {
                products = [];
                snapshot.forEach((doc) => {
                    products.push({ id: doc.id, ...doc.data() });
                });
                populateGrid();
            }, (error) => {
                console.error("Firebase error:", error);
                alert("Lỗi kết nối Firebase. Kiểm tra Rules trên Console.");
            });
        }

        async function importExcel(input) {
            const file = input.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const jsonData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { header: 1 });

                    const newProducts = [];
                    for (let i = 1; i < jsonData.length; i++) {
                        const row = jsonData[i];
                        if (!row[1]) continue;
                        newProducts.push({
                            stt: parseInt(row[0]) || i,
                            maSP: String(row[1]).trim(),
                            tenTP: String(row[2] || '').trim(),
                            timestamp: new Date().toISOString()
                        });
                    }

                    if (newProducts.length === 0) return alert("Không tìm thấy dữ liệu!");

                    if (confirm(`Import ${newProducts.length} sản phẩm lên Firebase?`)) {
                        for (const p of newProducts) {
                            await db.collection("thanhpham").add(p);
                        }
                        alert(`✅ Import thành công ${newProducts.length} sản phẩm!`);
                    }
                } catch (err) {
                    console.error(err);
                    alert("Lỗi import Excel: " + err.message);
                }
            };
            reader.readAsArrayBuffer(file);
        }

        function populateGrid() {
            const tbody = document.getElementById('gridBody');
            tbody.innerHTML = '';
            products.forEach((prod, i) => {
                const tr = document.createElement('tr');
                tr.className = 'cursor-pointer border-b hover:bg-gray-50';
                tr.innerHTML = `<td class="px-4 py-3">${prod.stt || ''}</td>
                                <td class="px-4 py-3 font-mono">${prod.maSP || ''}</td>
                                <td class="px-4 py-3">${prod.tenTP || ''}</td>`;
                tr.onclick = () => selectRow(i, tr);
                tbody.appendChild(tr);
            });
        }

        function selectRow(index, row) {
            document.querySelectorAll('#dataGrid tr').forEach(r => r.classList.remove('selected'));
            row.classList.add('selected');
            selectedIndex = index;
            const p = products[index];
            document.getElementById('sku').value = p.maSP || '';
            document.getElementById('tenTP').value = p.tenTP || '';
            updatePreview();
        }

        function loadFromGrid() {
            if (selectedIndex < 0) return alert("Vui lòng click vào một dòng trong danh sách!");
            alert("Đã load dữ liệu thành công!");
        }

        function filterGrid() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('#gridBody tr').forEach(row => {
                row.style.display = row.textContent.toLowerCase().includes(term) ? '' : 'none';
            });
        }

        function updatePreview() {
            const preview = document.getElementById('previewLabel');
            const sku = document.getElementById('sku').value || 'TP101020202.04.001';
            const maBTP = document.getElementById('maBTP').value || 'D009MT15066-02-0K';
            const tenTP = document.getElementById('tenTP').value || 'TP CẤP ĐÔNG SẦU RIÊNG MÚI RI A (4 TÚI) - HẦM ĐÔNG';
            const quyCach = document.getElementById('quyCach').value || '20kg';
            const vungCode = document.getElementById('vungNguyenLieu').value;
            const vungFull = vungCode === 'BP' ? 'Bình Phước' : vungCode === 'DN' ? 'Đồng Nai' : 'Miền Tây';
            const ngaySX = document.getElementById('ngaySX').value ? 
                document.getElementById('ngaySX').value.split('-').reverse().join('/') : '17/06/2026';

            preview.innerHTML = `
                <div style="font-size: 8.7pt; line-height: 1.18; padding: 3px 5px 4px 5px; height: 100%;">
                    <div style="display: flex; justify-content: space-between; font-weight: 600; margin-bottom: 5px;">
                        <div>SKU: ${sku}</div>
                        <div>Lot: ${maBTP}</div>
                    </div>
                    
                    <div style="font-size: 12.8pt; font-weight: 700; text-align: center; margin: 5px 0 7px; line-height: 1.12;">
                        ${tenTP}
                    </div>
                    
                    <hr style="border: 1px solid #000; margin: 4px 0 6px;">
                    
                    <div style="display: flex; justify-content: space-between; margin-bottom: 4px;">
                        <div>
                            <strong>Quy Cách /SPEC</strong><br>
                            Thùng/túi: ${quyCach}
                        </div>
                        <div style="text-align: right;">
                            <strong>KHỐI LƯỢNG /WEIGHT</strong><br>
                            ${quyCach}
                        </div>
                    </div>
                    
                    <div style="display: flex; justify-content: space-between; margin-bottom: 4px;">
                        <div>
                            <strong>KHÁCH HÀNG/CUSTOMER</strong><br>
                            CHANH THU GROUP
                        </div>
                        <div style="text-align: right;">
                            <strong>STT/INDEX</strong><br>
                            <span style="font-size: 16pt; font-weight: 700;">5200</span>
                        </div>
                    </div>
                    
                    <div style="margin-bottom: 4px;">
                        <strong>VÙNG NGUYÊN LIỆU</strong><br>
                        ${vungFull}
                    </div>
                    
                    <div style="display: flex; justify-content: space-between; font-size: 8.7pt; margin-top: 6px;">
                        <div>Ngày SX: ${ngaySX}</div>
                        <div>Ngày ĐG: ${ngaySX}</div>
                    </div>
                </div>
            `;
        }

        function updateSttCuoi() {
            const sttDau = parseInt(document.getElementById('sttDau').value) || 1;
            const soLuong = parseInt(document.getElementById('soLuongTem').value) || 1;
            const sttCuoi = sttDau + soLuong - 1;
            document.getElementById('sttCuoi').value = Math.max(sttCuoi, sttDau);
        }

        function printLabels() {
            const sttDau = parseInt(document.getElementById('sttDau').value) || 1;
            const sttCuoi = parseInt(document.getElementById('sttCuoi').value) || 1;
            const count = Math.max(1, sttCuoi - sttDau + 1);

            let printContent = `
                <style>
                    @page { size: 90mm 60mm; margin: 0mm !important; }
                    body { margin: 0 !important; padding: 0 !important; }
                    .label { 
                        width: 90mm; height: 60mm; 
                        padding: 1.5mm 4mm 2mm 4mm !important; 
                        box-sizing: border-box;
                        page-break-after: always;
                        font-family: Arial, sans-serif;
                        margin: 0 !important;
                    }
                </style>
            `;

            const base = document.getElementById('previewLabel').innerHTML;

            for (let i = 0; i < count; i++) {
                let html = base.replace(/5200/g, sttDau + i);
                printContent += `<div class="label">${html}</div>`;
            }

            const win = window.open('', '_blank');
            win.document.write(`
                <html>
                    <head><title>In Nhãn</title></head>
                    <body>${printContent}</body>
                </html>
            `);
            win.document.close();
            setTimeout(() => win.print(), 800);
        }
        
        function clearForm() {
            if (confirm("Xóa toàn bộ form?")) location.reload();
        }

        window.onload = () => {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('ngaySX').value = today;
            document.getElementById('ngayDG').value = today;
            
            setTimeout(() => {
                loadProductsFromFirebase();
                updatePreview();
            }, 1000);
        };
    </script>
</body>
</html>
